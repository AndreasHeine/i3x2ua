name: DCO Check

on:
  pull_request:
    branches: [master]
  push:
    branches: [master]

permissions:
  contents: read

jobs:
  dco:
    name: Verify Signed-off-by trailers
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Verify DCO sign-offs
        shell: bash
        run: |
          set -euo pipefail

          is_allowed_bot_commit() {
            local sha="$1"
            local author_name author_email committer_name committer_email
            author_name="$(git log -1 --pretty=%an "${sha}")"
            author_email="$(git log -1 --pretty=%ae "${sha}")"
            committer_name="$(git log -1 --pretty=%cn "${sha}")"
            committer_email="$(git log -1 --pretty=%ce "${sha}")"

            # Dependabot/Renovate bot commits are machine-authored and cannot always include DCO trailers.
            if [[ "${author_name}" =~ ^(dependabot\[bot\]|renovate\[bot\]|Renovate Bot)$ ]] || \
               [[ "${committer_name}" =~ ^(dependabot\[bot\]|renovate\[bot\]|Renovate Bot)$ ]] || \
               [[ "${author_email}" =~ (dependabot\[bot\]|renovate\[bot\])@users\.noreply\.github\.com$ ]] || \
               [[ "${committer_email}" =~ (dependabot\[bot\]|renovate\[bot\])@users\.noreply\.github\.com$ ]]; then
              return 0
            fi

            return 1
          }

          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            range="${{ github.event.pull_request.base.sha }}..${{ github.event.pull_request.head.sha }}"
          else
            before="${{ github.event.before }}"
            if [[ -z "${before}" || "${before}" == "0000000000000000000000000000000000000000" ]]; then
              range="${{ github.sha }}"
            else
              range="${before}..${{ github.sha }}"
            fi
          fi

          echo "Checking commit range: ${range}"

          mapfile -t commits < <(git rev-list --no-merges "${range}")

          if [[ ${#commits[@]} -eq 0 ]]; then
            echo "No non-merge commits to verify."
            exit 0
          fi

          failed=0
          for sha in "${commits[@]}"; do
            author_name="$(git log -1 --pretty=%an "${sha}")"
            author_email="$(git log -1 --pretty=%ae "${sha}")"

            if [[ "${author_name}" =~ \[bot\]$ || "${author_email}" =~ \[bot\]@users\.noreply\.github\.com$ ]]; then
              echo "Skipping bot commit ${sha} (${author_name} <${author_email}>)"
              continue
            fi

            if ! git log -1 --pretty=%B "${sha}" | grep -Eiq '^Signed-off-by:\s+.+<.+>$'; then
              if is_allowed_bot_commit "${sha}"; then
                echo "Skipping DCO trailer check for allowed bot commit ${sha}"
                continue
              fi
              echo "Missing Signed-off-by trailer in commit ${sha}"
              failed=1
            fi
          done

          if [[ ${failed} -ne 0 ]]; then
            echo "DCO check failed. Amend commits with: git commit --amend -s"
            exit 1
          fi

          echo "DCO check passed."
