services:
  i3x2ua:
    image: i3x2ua:prod
    container_name: i3x2ua
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      I3X_OPCUA_ENDPOINT: ${I3X_OPCUA_ENDPOINT:-opc.tcp://opcua.umati.app:4843}
      I3X_OPCUA_USERNAME: ${I3X_OPCUA_USERNAME:-}
      I3X_OPCUA_PASSWORD: ${I3X_OPCUA_PASSWORD:-}
      I3X_OPCUA_SECURITY_MODE: ${I3X_OPCUA_SECURITY_MODE:-None}
      I3X_OPCUA_SECURITY_POLICY: ${I3X_OPCUA_SECURITY_POLICY:-}
      I3X_OPCUA_CLIENT_CERT_PATH: ${I3X_OPCUA_CLIENT_CERT_PATH:-}
      I3X_OPCUA_CLIENT_KEY_PATH: ${I3X_OPCUA_CLIENT_KEY_PATH:-}
      I3X_OPCUA_CLIENT_KEY_PASSWORD: ${I3X_OPCUA_CLIENT_KEY_PASSWORD:-}
      I3X_OPCUA_SERVER_CERT_PATH: ${I3X_OPCUA_SERVER_CERT_PATH:-}
      I3X_LOG_LEVEL: ${I3X_LOG_LEVEL:-INFO}
    read_only: true
    tmpfs:
      - /tmp:size=64m,noexec,nosuid
      - /home/app:size=16m,noexec,nosuid
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    pids_limit: 256
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/v1/info', timeout=3)"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s