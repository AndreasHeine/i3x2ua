services:
  i3x2ua:
    build:
      context: .
    image: i3x2ua-local
    container_name: i3x2ua
    restart: unless-stopped
    command:
      - python
      - -m
      - uvicorn
      - i3x_server.main:app
      - --host
      - 0.0.0.0
      - --port
      - "8000"
      - --proxy-headers
      - --forwarded-allow-ips
      - "*"
    environment:
      I3X_OPCUA_ENDPOINT: ${I3X_OPCUA_ENDPOINT:-opc.tcp://opcua.umati.app:4843}
      I3X_OPCUA_USERNAME: ${I3X_OPCUA_USERNAME:-}
      I3X_OPCUA_PASSWORD: ${I3X_OPCUA_PASSWORD:-}
      I3X_OPCUA_SECURITY_MODE: ${I3X_OPCUA_SECURITY_MODE:-None}
      I3X_OPCUA_SECURITY_POLICY: ${I3X_OPCUA_SECURITY_POLICY:-}
      I3X_OPCUA_CLIENT_CERT_PATH: ${I3X_OPCUA_CLIENT_CERT_PATH:-}
      I3X_OPCUA_CLIENT_KEY_PATH: ${I3X_OPCUA_CLIENT_KEY_PATH:-}
      I3X_OPCUA_CLIENT_KEY_PASSWORD: ${I3X_OPCUA_CLIENT_KEY_PASSWORD:-}
      I3X_OPCUA_SERVER_CERT_PATH: ${I3X_OPCUA_SERVER_CERT_PATH:-}
      I3X_OPCUA_BROWSE_CONCURRENCY: ${I3X_OPCUA_BROWSE_CONCURRENCY:-128}
      I3X_OPCUA_METADATA_CACHE_TTL_SECONDS: ${I3X_OPCUA_METADATA_CACHE_TTL_SECONDS:-300}
      I3X_OPCUA_CONNECTION_MONITOR_INTERVAL_SECONDS: ${I3X_OPCUA_CONNECTION_MONITOR_INTERVAL_SECONDS:-5}
      I3X_MODEL_REFRESH_INTERVAL_SECONDS: ${I3X_MODEL_REFRESH_INTERVAL_SECONDS:-60}
      I3X_MODEL_PRELOAD_ON_STARTUP: ${I3X_MODEL_PRELOAD_ON_STARTUP:-1}
      I3X_MODEL_PRELOAD_BLOCKING: ${I3X_MODEL_PRELOAD_BLOCKING:-0}
      I3X_FAIL_STARTUP_ON_MODEL_PRELOAD_ERROR: ${I3X_FAIL_STARTUP_ON_MODEL_PRELOAD_ERROR:-0}
      I3X_SUBSCRIPTION_INTERVAL_SECONDS: ${I3X_SUBSCRIPTION_INTERVAL_SECONDS:-5}
      I3X_SUBSCRIPTION_MAX_UPDATES: ${I3X_SUBSCRIPTION_MAX_UPDATES:-10000}
      I3X_SUBSCRIPTION_TTL_SECONDS: ${I3X_SUBSCRIPTION_TTL_SECONDS:-300}
      I3X_ENABLE_TYPE_BROWSENAME_LOOKUP: ${I3X_ENABLE_TYPE_BROWSENAME_LOOKUP:-0}
      I3X_TYPE_BROWSENAME_LOOKUP_TIMEOUT_S: ${I3X_TYPE_BROWSENAME_LOOKUP_TIMEOUT_S:-0.05}
      I3X_TYPE_BROWSENAME_LOOKUP_MAX: ${I3X_TYPE_BROWSENAME_LOOKUP_MAX:-20}
      I3X_LOG_LEVEL: ${I3X_LOG_LEVEL:-INFO}
      I3X_ENABLE_MCP: ${I3X_ENABLE_MCP:-0}
    volumes:
      - ${I3X_OPCUA_CERTS_DIR:-./certs}:/app/certs:ro
    expose:
      - "8000"
    read_only: true
    tmpfs:
      - /tmp:size=64m,noexec,nosuid
      - /home/app:size=16m,noexec,nosuid
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    pids_limit: 256
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/v1/info', timeout=3)"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    networks:
      - backend

  nginx:
    build:
      context: ./nginx
    container_name: i3x2ua-nginx
    restart: unless-stopped
    depends_on:
      i3x2ua:
        condition: service_healthy
    ports:
      - "${NGINX_HTTP_PORT:-8080}:80"
      - "${NGINX_HTTPS_PORT:-8443}:443"
    environment:
      NGINX_UPSTREAM_HOST: ${NGINX_UPSTREAM_HOST:-i3x2ua}
      NGINX_UPSTREAM_PORT: ${NGINX_UPSTREAM_PORT:-8000}
      NGINX_SERVER_NAME: ${NGINX_SERVER_NAME:-_}
      NGINX_HTTPS_ENABLED: ${NGINX_HTTPS_ENABLED:-1}
      NGINX_HTTPS_REDIRECT_PORT: ${NGINX_HTTPS_REDIRECT_PORT:-8443}
      NGINX_SSL_CERTIFICATE: ${NGINX_SSL_CERTIFICATE:-/etc/nginx/certs/https-sample/fullchain.pem}
      NGINX_SSL_CERTIFICATE_KEY: ${NGINX_SSL_CERTIFICATE_KEY:-/etc/nginx/certs/https-sample/privkey.pem}
      NGINX_BASIC_AUTH_ENABLED: ${NGINX_BASIC_AUTH_ENABLED:-0}
      NGINX_BASIC_AUTH_USER: ${NGINX_BASIC_AUTH_USER:-}
      NGINX_BASIC_AUTH_PASSWORD: ${NGINX_BASIC_AUTH_PASSWORD:-}
      NGINX_BASIC_AUTH_REALM: ${NGINX_BASIC_AUTH_REALM:-i3x2ua}
    volumes:
      - ${NGINX_SSL_CERTS_DIR:-./certs}:/etc/nginx/certs:ro
    networks:
      - backend

networks:
  backend:
    driver: bridge